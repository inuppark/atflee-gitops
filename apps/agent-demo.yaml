apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/inuppark/atflee-gitops.git
    targetRevision: HEAD
    path: agent-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
