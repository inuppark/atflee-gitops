apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ax-console
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/inuppark/atflee-gitops.git
    targetRevision: HEAD
    path: ax-console
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
