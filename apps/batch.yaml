apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: batch
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/inuppark/atflee-gitops.git
    targetRevision: HEAD
    path: batch
  destination:
    server: https://kubernetes.default.svc
    namespace: batch
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
