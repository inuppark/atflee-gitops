apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  labels: { app: valkey }
spec:
  replicas: 1
  selector:
    matchLabels: { app: valkey }
  template:
    metadata:
      labels: { app: valkey }
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          ports:
            - containerPort: 6379
