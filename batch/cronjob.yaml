apiVersion: batch/v1
kind: CronJob
metadata:
  name: voc-report
spec:
  schedule: "0 21 * * *"
  timeZone: "Asia/Seoul"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: voc-agent
              image: atfleeacr0707.azurecr.io/voc-agent:v5
              env:
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: voc-agent-secrets
                      key: ANTHROPIC_API_KEY
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: voc-slack
                      key: SLACK_WEBHOOK_URL
