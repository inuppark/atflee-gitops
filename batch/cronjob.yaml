apiVersion: batch/v1
kind: CronJob
metadata:
  name: voc-report
spec:
  schedule: "*/3 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: voc-agent
              image: atfleeacr0707.azurecr.io/voc-agent:v2
              env:
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: voc-agent-secrets
                      key: ANTHROPIC_API_KEY
