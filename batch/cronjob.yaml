apiVersion: batch/v1
kind: CronJob
metadata:
  name: voc-report
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: report
              image: busybox:1.36
              command: ["sh", "-c", "echo VOC daily summary generated at $(date)"]
